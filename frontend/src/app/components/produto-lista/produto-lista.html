<div class="container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Lista de Produtos</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="actions-container">
        <button mat-raised-button color="primary" routerLink="/cadastro">
          <mat-icon>add</mat-icon>
          Novo Produto
        </button>
      </div>

      <table mat-table [dataSource]="produtos" class="mat-elevation-z8">
        
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let produto"> {{produto.id}} </td>
        </ng-container>

        <ng-container matColumnDef="nome">
          <th mat-header-cell *matHeaderCellDef> Nome </th>
          <td mat-cell *matCellDef="let produto"> {{produto.nome}} </td>
        </ng-container>

        <ng-container matColumnDef="preco">
          <th mat-header-cell *matHeaderCellDef> Preço </th>
          <td mat-cell *matCellDef="let produto"> {{produto.preco | currency:'BRL'}} </td>
        </ng-container>

        <ng-container matColumnDef="descricao">
          <th mat-header-cell *matHeaderCellDef> Descrição </th>
          <td mat-cell *matCellDef="let produto"> {{produto.descricao}} </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="colunas"></tr>
        <tr mat-row *matRowDef="let row; columns: colunas;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
